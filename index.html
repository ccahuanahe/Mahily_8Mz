<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi amor ❤️</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    color:white;
}

.container{
    margin-top:80px;
}

h1{
    font-size:50px;
}

p{
    font-size:22px;
    width:70%;
    margin:auto;
}

.gallery{
    margin-top:40px;
}

.gallery img{
    width:250px;
    border-radius:15px;
    margin:10px;
    box-shadow:0px 10px 20px rgba(0,0,0,0.3);
}

button{
    margin-top:30px;
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff1e4d;
}

</style>
</head>

<body>

<div class="container">

<h1>Para el amor de mi vida ❤️</h1>

<p>
Quería hacer algo especial para ti.
Gracias por todos los momentos hermosos que hemos vivido juntos.
Eres la mejor parte de mi vida.
</p>

<button onclick="mostrar()">Tengo algo más para ti</button>

<div id="mensaje" style="display:none;margin-top:40px;font-size:25px;">
Te amo muchísimo ❤️
</div>

<div class="gallery">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">

</div>

</div>

<script>

function mostrar(){
document.getElementById("mensaje").style.display="block";
}

</script>

</body>
</html>
